<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIDEO</title>
    <!-- <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    /> -->
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.png" type="image/x-icon" />
  </head>
  <body>
    <header class="header">
      <div class="header__top">
        <div class="logo">
          <a href="#">
            <img src="logo.png" alt="" />
          </a>
        </div>
        <nav class="menu">
          <ul class="menu__list">
            <div class="info__check">
              <p class="width__info" id="width-display">Ширина:</p>
              <p class="height__info" id="height-display">Высота:</p>
            </div>
          </ul>
        </nav>
      </div>
    </header>

    <!-- ОСНОВА -->
    <section class="hat">
      <div class="container">
        <div class="operation__field">
          <p class="lesson-name">Изучение</p>
          <div class="fields">
            <input
              class="lesson-number"
              type="number"
              id="pageName"
              placeholder="Введите номер урока"
              oninput="difInput(this)"
            />
            <button class="lesson-open" onclick="goToPage()">
              Открыть страницу
            </button>
            <p class="lesson__count">
              Уроков:
              <b>
                <span id="lessCount"></span>
              </b>
            </p>
          </div>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
